<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://at.alicdn.com" crossorigin />
    <!-- 更新图标: pnpm sync:icon "<新CSS URL>" — 勿手动改此行,脚本会覆写 -->
    <link rel="stylesheet" href="https://at.alicdn.com/t/c/font_4644876_k24gvyy3q1.css" />
    <title>AuroraUI - 轻盈如极光的 React 组件库</title>
    <meta
      name="description"
      content="极光感的 React 组件库 — 60+ 组件 + 可视化看板搭建器, 支持深色模式与主题定制, 纯 CSS 动效, TypeScript 完整类型。"
    />
    <meta name="theme-color" content="#7c3aed" />
    <meta property="og:title" content="AuroraUI - 轻盈如极光的 React 组件库" />
    <meta
      property="og:description"
      content="60+ 组件 + 可视化看板搭建器, 极光视觉, TypeScript 完整类型。"
    />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary" />
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('aurora-theme');
          var theme =
            saved === 'light' || saved === 'dark'
              ? saved
              : window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light';
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
